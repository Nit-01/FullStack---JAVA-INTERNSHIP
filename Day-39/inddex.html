<!DOCTYPE html>
<html>
<body>

<script>
const add = (a, b) => a + b;

let result = add(10, 20);
console.log(result);

let promise = new Promise((resolve, reject) => {
    let success = true;

    if(success) {
        resolve("Operation Successful");
    } else {
        reject("Operation Failed");
    }
});

promise
    .then(response => console.log(response))
    .catch(error => console.log(error));

</script>

</body>
</html>
