<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
        body {
            background-color: lightblue;
        }

        .box {
            width: 50%;
            padding: 20px;
            background-color: red;
            color: white;
        }

        @media (max-width: 600px) {
            .box {
                width: 100%;
                background-color: green;
            }
        }
    </style>
</head>
<body>

<div class="box">
    Responsive Box
</div>

</body>
</html>
