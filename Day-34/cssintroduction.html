<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>
    <style>
        body {
            background-color: lightblue;
        }
        h1 {
            color: red;
            text-align: center;
        }
        p {
            font-size: 18px;
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Welcome</h1>
    <p>This is a styled paragraph using CSS.</p>

</body>
</html>
